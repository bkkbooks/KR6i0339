body:
  text: 楞伽經序朝議大夫直龍圖閣權江淮荊浙等路制置鹽礬兼發運副使上護軍賜紫金魚袋蔣之奇撰之奇嘗苦楞伽經難讀又難得善本會南都太子太保致政張公施此經而眉山蘇子瞻為書而刻之板以為金山常住金山長老佛印大師子元持以見寄之奇為之言曰佛之所説經捴十二部而其多至於五千卷方其正法流行之時人有聞半偈得一句而悟入者蓋不可為量數至於像法末法之後去聖既遠人始溺於文字有入海算沙之困而於一真之體乃漫不省解於是有祖師出焉直指人心見性成佛以為教外別傳於動容發語之頃而上根利器之人已目擊而得之矣故雲門至於罵佛而藥山至戒人不得續經皆此意也由是去佛而謂之禪離義而謂之玄故學佛者必詆禪而諱義者亦必宗玄二家之徒更相非而不知其相為用也且禪者六度之一也顧豈異於佛哉之奇以為禪出於佛而玄出於義不以佛廢禪不以玄廢義則其近之矣冉求問聞斯行諸孔子曰聞斯行之子路問聞斯行諸曰有父兄在如之何其聞斯行之求也退故進之由也兼人故退之説豈有常哉救其偏而已學佛之敝至於溺經文惑句義而人不體玄則言禪以救之學禪之敝至於馳空言玩琦辨而人不了義則言佛以救之二者更相救而佛法完矣昔達磨西來既已傳心印於二祖且云吾有楞伽經四卷亦用付汝即是如來心地要門令諸衆生開示悟入此亦佛與禪並傳而玄與義俱付也至五祖始易以金剛經傳授故六祖聞客讀金剛經而問其所從來客云我從蘄州黃梅縣東五祖山來五祖大師常勸僧俗但持金剛經即自見性成佛矣則是持金剛經者始於五祖故金剛以是盛行於世而楞伽遂無傳焉今之傳者實自張公倡之之奇過南都謁張公親聞公説楞伽因緣始張公自三司使翰林學士出守滁一日入琅邪僧舍見一經函發而視之乃楞伽經也恍然覺其前生之所書筆畫宛然其始神先受之甚明也之奇聞羊叔子五歲時令乳母取所弄金環乳母謂之汝初無是物祜即自詣鄰人李氏東垣桑木中探得之主人驚曰此吾亡兒所失物也云何持去乳母具言之知祜之前身為李氏子也白樂天始生七月姆指之無兩字雖試百數不差九歲諳識聲律史氏以為篤於互章蓋天稟然而樂天固自以為宿習之緣矣人之以是一真不滅之性而死生去來於天地之間其為世數雖折天下之草木以為籌筯不能算之矣然以淪於死生神識疲耗不能復記惟圓明不昧之人知焉有如張公以高文大册再中制舉登侍從秉鈞軸出入朝廷逾四十年風烈事業播人耳目則其前身嘗為大善知識無足疑者其能記憶前世之事豈不謂信然哉故因讀楞伽新經而記其因緣於經之端云書楞伽經後楞伽阿跋多羅寶經先佛所説微妙第一真實了義故謂之佛語心品祖師達磨以付二祖曰吾觀震旦所有經教惟楞伽四卷可以印心祖祖相授以為心法如醫之難經句句皆理字字皆法後世達者神而明之如槃走珠如珠走槃無不可者若出新意而棄舊學以為無用非愚無知則狂而已近歲學者各宗其師務從簡便得一句一偈自謂了證至使婦人孺子抵掌嬉笑爭談禪悅高者為名下者為利餘波末流無所不至而佛法微矣譬如俚俗醫師不由經論直授方藥以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語矣世人徒見其有一至之功或捷於古人因謂難經不學而可豈不誤哉楞伽義趣幽眇文字簡古讀者或不能句而況遺文以得義忘義以了心者乎此其所以寂寥於世幾廢而僅存也太子太保樂全先生張公安道以廣大心得清淨覺慶歷中嘗為滁州至一僧舍偶見此經入手恍然如獲舊物開卷未終夙障冰解細視筆畫手迹宛然悲喜太息從是悟入常以經首四偈發明心要軾遊於公之門三十年矣今年二月過南都見公於私第公時年七十九幻滅都盡惠光渾圜而軾亦老於憂患百念灰冷公以為可教者乃授此經且以錢三十萬使印施於江淮間而金山長老佛印大師子元曰印施有盡若書而刻之則無盡軾乃為書之而元使其侍者曉機走錢塘求善工刻之板遂以為金山常住元豐八年九月九日朝奉郎新差知登州軍州兼管內勸農事騎都尉借緋蘇軾書楞伽通義序如來藏心未始有物所謂五法三自性八識二無我由之而出此楞伽佛語心之大旨也故以離相言之雖正智如如亦悉須離以即性言之雖名相妄想無不皆即是則破相無不盡顯性無不周往復折徵析理精微此經該而存焉其窮理盡性之詮乎故達磨傳之馬祖示之張文定公夙契之蘇文忠公發揮之而世始盛傳人知景慕獨其文簡古譯者蓋將使上根達識深於自得傳之後世未遽以文字曉則不至於玩且敞而中下根器幾不能句而望崖焉注釋之家非無發明往往昧於教意暗於文旨正邪莫辨其説混淆無上至教幾息于時余竊患之試托一二徐思而得欲罷不能於是究一經始末節句義起盡按吾台宗規矩大體申述其旨目曰通義載藁載書期年乃成嘗出以示人則曰佛旨淵深凡情淺陋幾何而不貽誚於大方之家曰有是哉以凡望聖則余豈敢以人望人余亦未之多遜或又曰使譯者意不在簡古則已觀今之説則晦者明窒者通迂者直難者易無乃得罪於昔人耶曰知我罪我其惟春秋余固不敢辭嘉定己巳中冬三日柏庭善月序
